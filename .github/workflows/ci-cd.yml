# .github/workflows/ci-cd.yml
# Même schéma que cashflow.next : déploiement production Vercel sur push main.
# Secrets GitHub du dépôt (Réglages → Secrets) :
#   VERCEL_TOKEN      - https://vercel.com/account/tokens
#   VERCEL_ORG_ID     - .vercel/project.json ou paramètres équipe
#   VERCEL_PROJECT_ID - id du projet Vercel « Hoolo Service » (pas celui de cashflow)
#
# Variables d’environnement Firebase : à renseigner dans Vercel (Projet → Settings → Environment Variables),
# reproduire les clés NEXT_PUBLIC_FIREBASE_* de .env.example
name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          # L’action pinne vercel@25.x par défaut ; l’API Vercel exige CLI ≥ 47.2.2
          vercel-version: 53.1.0
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          vercel-args: --prod
